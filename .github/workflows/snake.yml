name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#58e6ff&color_dot_empty=#161b22&color_dot_1=#0e4429&color_dot_2=#006d32&color_dot_3=#26a641&color_dot_4=#39d353
            dist/snake.svg?color_snake=#2ea043&color_dot_empty=#ebedf0&color_dot_1=#9be9a8&color_dot_2=#40c463&color_dot_3=#30a14e&color_dot_4=#216e39

      - name: Push output to dist branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
